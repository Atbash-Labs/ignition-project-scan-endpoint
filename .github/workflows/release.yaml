name: Build and Release Module (8.1)

on:
  push:
    tags:
      - 'v*-8.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "VERSION=${RAW%-8.1}" >> "$GITHUB_OUTPUT"

      - name: Generate signing keystore and certificate
        run: |
          keytool -genkeypair \
            -alias selfsigned \
            -keyalg RSA -keysize 2048 \
            -validity 3650 \
            -keystore signing.jks \
            -storepass changeit \
            -keypass changeit \
            -dname "CN=Atbash Labs, OU=Dev, O=Atbash Labs, L=Unknown, ST=Unknown, C=US"
          keytool -exportcert \
            -alias selfsigned \
            -keystore signing.jks \
            -storepass changeit \
            -file signing.crt

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          version=${{ steps.version.outputs.VERSION }}
          signModule=true
          ignition.signing.keystoreFile=signing.jks
          ignition.signing.keystorePassword=changeit
          ignition.signing.certFile=signing.crt
          ignition.signing.certAlias=selfsigned
          ignition.signing.certPassword=changeit
          EOF

      - name: Build module
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }} (Ignition 8.1)
          generate_release_notes: true
          files: build/Project-Scan-Endpoint.modl
